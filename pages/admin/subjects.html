<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subjects · Examination Cell</title>
  <link rel="icon" type="image/png" href="../../assets/logo.png">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <script src="../../js/store.js"></script>
  <script src="../../js/layout.js"></script>
  <script>
    const user = bootPage({
      role: 'admin', currentPage: 'subjects.html',
      crumb: 'Master Data', title: 'Subjects'
    });
    if (!user) throw new Error('Not authenticated');

    let filter = { q: '', dept: '', sem: '' };

    function renderPage() {
      const subjects = Store.list('subjects');
      const filtered = subjects.filter(s =>
        (!filter.q || s.name.toLowerCase().includes(filter.q.toLowerCase()) || s.code.toLowerCase().includes(filter.q.toLowerCase())) &&
        (!filter.dept || s.department === filter.dept) &&
        (!filter.sem || s.semester === filter.sem)
      );

      document.getElementById('page-content').innerHTML = `
        <div class="panel">
          <div class="panel-head">
            <div>
              <h3>Subject Catalogue</h3>
              <div class="sub">${subjects.length} subjects across all departments and semesters</div>
            </div>
            <button class="btn btn-dark" onclick="subjectForm()">${ICONS.plus} Add Subject</button>
          </div>
          <div class="filter-bar">
            <div class="search-input">
              ${ICONS.search}
              <input type="text" value="${filter.q}" placeholder="Search by code or name" oninput="filter.q=this.value; renderPage()">
            </div>
            <div class="field">
              <label>Department</label>
              <select onchange="filter.dept=this.value; renderPage()">
                <option value="">All Departments</option>
                ${Store.list('departments').map(d => `<option ${filter.dept===d.name?'selected':''}>${d.name}</option>`).join('')}
              </select>
            </div>
            <div class="field">
              <label>Semester</label>
              <select onchange="filter.sem=this.value; renderPage()">
                <option value="">All Semesters</option>
                ${Store.list('semesters').map(s => `<option value="${s.name}" ${filter.sem===s.name?'selected':''}>${s.name} Sem</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="panel-body nopad">
            <div class="table-wrap">
              <table class="data">
                <thead>
                  <tr>
                    <th>Code</th>
                    <th>Subject Name</th>
                    <th>Department</th>
                    <th>Semester</th>
                    <th>Credits</th>
                    <th style="text-align:right">Actions</th>
                  </tr>
                </thead>
                <tbody>
                  ${filtered.length ? filtered.map(s => `
                    <tr>
                      <td><strong>${s.code}</strong></td>
                      <td>${s.name}</td>
                      <td>${s.department}</td>
                      <td>${s.semester}</td>
                      <td>${s.credits}</td>
                      <td style="text-align:right">
                        <button class="btn sm" onclick="subjectForm('${s.id}')">${ICONS.edit} Edit</button>
                        <button class="btn sm" onclick="deleteSubject('${s.id}')">${ICONS.trash}</button>
                      </td>
                    </tr>
                  `).join('') : `<tr><td colspan="6"><div class="empty"><h4>No subjects found</h4></div></td></tr>`}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      `;
    }

    function subjectForm(id) {
      const s = id ? Store.byId('subjects', id) : { id: Store.newId('s'), code: '', name: '', department: 'Civil Engineering', semester: '1st', credits: 3 };
      openModal(`
        <div class="modal-head">
          <h3>${id ? 'Edit Subject' : 'Add Subject'}</h3>
          <button class="icon-btn" onclick="closeModal(this)">${ICONS.x}</button>
        </div>
        <div class="modal-body">
          <div class="form-row">
            <div class="field"><label>Subject Code</label><input id="sf-code" value="${s.code}" placeholder="e.g. CIV301"></div>
            <div class="field"><label>Credits</label><input id="sf-credits" type="number" value="${s.credits}"></div>
          </div>
          <div class="field"><label>Subject Name</label><input id="sf-name" value="${s.name}"></div>
          <div class="form-row">
            <div class="field">
              <label>Department</label>
              <select id="sf-dept">
                ${Store.list('departments').map(d => `<option ${s.department===d.name?'selected':''}>${d.name}</option>`).join('')}
              </select>
            </div>
            <div class="field">
              <label>Semester</label>
              <select id="sf-sem">
                ${Store.list('semesters').map(sm => `<option value="${sm.name}" ${s.semester===sm.name?'selected':''}>${sm.name} Semester</option>`).join('')}
              </select>
            </div>
          </div>
        </div>
        <div class="modal-foot">
          <button class="btn" onclick="closeModal(this)">Cancel</button>
          <button class="btn btn-dark" onclick="saveSubject('${s.id}', ${!!id})">${id ? 'Save' : 'Add'}</button>
        </div>
      `);
    }

    function saveSubject(id, isEdit) {
      const s = {
        id,
        code: document.getElementById('sf-code').value.trim().toUpperCase(),
        name: document.getElementById('sf-name').value.trim(),
        department: document.getElementById('sf-dept').value,
        semester: document.getElementById('sf-sem').value,
        credits: +document.getElementById('sf-credits').value || 3,
      };
      if (!s.code || !s.name) { toast('Code and name required', 'danger'); return; }
      Store.upsert('subjects', s);
      Store.log(isEdit ? 'edit' : 'create', `${isEdit?'Updated':'Created'} subject: ${s.code}`);
      toast(`Subject ${isEdit ? 'updated' : 'added'}`, 'success');
      closeModal();
      renderPage();
    }

    function deleteSubject(id) {
      const s = Store.byId('subjects', id);
      confirmDialog(`Delete subject "${s.code} – ${s.name}"?`, () => {
        Store.remove('subjects', id);
        Store.log('delete', `Deleted subject: ${s.code}`);
        toast('Subject deleted', 'success');
        renderPage();
      });
    }

    renderPage();
  </script>
</body>
</html>
